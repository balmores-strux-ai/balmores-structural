# Custom domains (balmoreslab.com):
# - List ONLY www.* in `domains` below so Render redirects apex → www (not www → apex).
#   If you list the bare root first, Render sends www → apex and broken-apex TLS strands users.
# - DNS: www CNAME → your-service.onrender.com; apex A → 216.24.57.1 (Render). Remove AAAA.
# - Cloudflare: SSL "Full (strict)" OR proxy off (gray cloud) so Render terminates TLS cleanly.
# After changing this file, sync the Blueprint in the Render dashboard (or push if auto-sync).
services:
  - type: web
    name: balmores-structural-backend
    runtime: python
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      # 3.10.14 is not always available on Render; 3.10.12 is stable.
      - key: PYTHON_VERSION
        value: "3.10.12"
    # CPU torch: use --extra-index-url so torch deps (jinja2, etc.) resolve from PyPI (avoids pip metadata errors).
    buildCommand: pip install --no-cache-dir torch==2.2.2+cpu --extra-index-url https://download.pytorch.org/whl/cpu && pip install --no-cache-dir -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

  - type: web
    name: balmores-structural-frontend
    runtime: node
    plan: free
    rootDir: frontend
    healthCheckPath: /
    domains:
      - www.balmoreslab.com
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      # Server-side proxy target (browser calls same-origin /api/backend/*)
      - key: BACKEND_PROXY_URL
        value: https://balmores-structural-backend.onrender.com
      # Leave unset (or empty) so the app uses /api/backend → BACKEND_PROXY_URL (avoids mixed-content HTTP API).
      - key: NEXT_PUBLIC_API_URL
        sync: false
